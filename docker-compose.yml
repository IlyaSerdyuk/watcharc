version: '3.8'

services:
  nextjs:
    image: watcharc-app
    container_name: watcharc
    env_file:
      - .env
    environment:
      - VIRTUAL_HOST=watcharc.org
      - LETSENCRYPT_HOST=watcharc.org
      - LETSENCRYPT_EMAIL=ilya@serdyuk.pro
      - VIRTUAL_PORT=3000
    networks:
      - db_network
      - proxy_network
    restart: unless-stopped

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: imgproxy
    restart: unless-stopped
    networks:
      - proxy_network
    environment:
      # --- nginx-proxy / acme-companion ---
      VIRTUAL_HOST: img.watcharc.org
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: img.watcharc.org
      LETSENCRYPT_EMAIL: ilya@serdyuk.pro

      # --- S3 source configuration ---
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: ${S3_ENDPOINT}
      IMGPROXY_S3_ENDPOINT_USE_PATH_STYLE: "true"
      IMGPROXY_S3_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      IMGPROXY_S3_BUCKET: ${S3_BUCKET}

      # --- optional: security & performance ---
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_MAX_SRC_RESOLUTION: 50.0   # megapixels
      IMGPROXY_READ_TIMEOUT: 15s
      IMGPROXY_WRITE_TIMEOUT: 15s

      # --- if you don't want to sign URLs (less secure) ---
      # IMGPROXY_ALLOW_ORIGIN: "*"
      # IMGPROXY_IGNORE_SIGNATURE: "true"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  proxy_network:
    external: true
  db_network:
    external: true
